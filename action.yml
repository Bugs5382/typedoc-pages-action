name: "TypeDoc Pages (versioned)"
description: "Build versioned TypeDoc docs (@shipgirl/typedoc-plugin-versions) and publish them to GitHub Pages."
author: "Shane Froebel"
branding:
  icon: book-open
  color: purple

inputs:
  github-token:
    description: "Token used to read the publish branch and deploy (usually secrets.GITHUB_TOKEN)."
    required: true
  versions:
    description: "Preserve version history: restore the previously published docs before building so @shipgirl/typedoc-plugin-versions appends the new version. Set to 'false' for a single-version site that is replaced on each deploy."
    required: false
    default: "true"
  node-version:
    description: "Node.js version used to build the docs."
    required: false
    default: "lts/*"
  docs-dir:
    description: "Directory TypeDoc writes to (must match the `out` in typedoc.json)."
    required: false
    default: "docs"
  publish-branch:
    description: "Branch the rendered site is published to (the Pages source)."
    required: false
    default: "gh-pages"
  install-command:
    description: "Command that installs dependencies before building."
    required: false
    default: "npm ci --ignore-scripts --legacy-peer-deps"
  build-command:
    description: "Command that runs TypeDoc."
    required: false
    default: "npm run typedoc"

runs:
  using: "composite"
  steps:
    # Restore the previously published docs into the output dir so
    # @shipgirl/typedoc-plugin-versions APPENDS the new version rather than
    # replacing the whole history. First publish (no branch yet) is a no-op.
    # Skipped when versions are disabled. Assumes the consumer has already run
    # actions/checkout.
    - name: Restore published docs
      if: ${{ inputs.versions == 'true' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        PUBLISH_BRANCH: ${{ inputs.publish-branch }}
        DOCS_DIR: ${{ inputs.docs-dir }}
      run: |
        if git ls-remote --exit-code --heads origin "$PUBLISH_BRANCH" >/dev/null 2>&1; then
          git clone --branch "$PUBLISH_BRANCH" --depth 1 \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" .docs-prev
          rm -rf .docs-prev/.git
          mkdir -p "$DOCS_DIR"
          cp -a .docs-prev/. "$DOCS_DIR"/
          rm -rf .docs-prev
          # Drop the plugin-managed aliases (stable/dev/latest) and any top-level
          # symlinks so @shipgirl/typedoc-plugin-versions can regenerate them
          # without an EEXIST collision. The version directories + versions.js
          # metadata are kept, so history is preserved.
          rm -rf "$DOCS_DIR/stable" "$DOCS_DIR/dev" "$DOCS_DIR/latest"
          find "$DOCS_DIR" -maxdepth 1 -type l -delete
        else
          echo "No '$PUBLISH_BRANCH' branch yet -- first publish."
        fi

    - name: Setup Node ${{ inputs.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'

    - name: Install dependencies
      shell: bash
      run: ${{ inputs.install-command }}

    - name: Build docs
      shell: bash
      run: ${{ inputs.build-command }}

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ inputs.github-token }}
        publish_branch: ${{ inputs.publish-branch }}
        publish_dir: ./${{ inputs.docs-dir }}
